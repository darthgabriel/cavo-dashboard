name: Scrape Instagram

on:
  schedule:
    - cron: '0 10 * * *'   # 6 AM VET (UTC-4) = 10:00 UTC
  workflow_dispatch:        # manual trigger

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - run: npm ci
        working-directory: dashboard

      - run: npx playwright install chromium
        working-directory: dashboard

      - run: node scripts/scraper.mjs
        working-directory: dashboard

      - name: Commit updated data
        run: |
          git config user.name "cavo-bot"
          git config user.email "bot@cavo.agent"
          git add dashboard/public/data/instagram.json
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "auto: update instagram data [skip ci]"
            git push
          fi
